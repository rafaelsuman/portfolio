<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3a"/>
    </linearGradient>
    <linearGradient id="green3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#25d366"/>
      <stop offset="100%" style="stop-color:#128c7e"/>
    </linearGradient>
    <linearGradient id="amber3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#25d366"/>
      <stop offset="100%" style="stop-color:#128c7e"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#bg3)"/>

  <!-- Grid lines -->
  <g opacity="0.04">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#06b6d4" stroke-width="1"/>
    <line x1="0" y1="350" x2="1200" y2="350" stroke="#06b6d4" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#06b6d4" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="400" stroke="#06b6d4" stroke-width="1"/>
  </g>

  <!-- LEFT: WhatsApp phone mockup -->
  <g transform="translate(60, 40)" filter="url(#shadow3)">
    <!-- Phone body -->
    <rect x="0" y="0" width="210" height="320" rx="24" fill="#111d2e" stroke="rgba(6,182,212,0.3)" stroke-width="1.5"/>
    <!-- WhatsApp header -->
    <rect x="0" y="0" width="210" height="52" rx="24" fill="url(#green3)"/>
    <rect x="0" y="28" width="210" height="24" fill="#128c7e"/>
    <!-- Avatar -->
    <circle cx="30" cy="26" r="13" fill="rgba(255,255,255,0.2)"/>
    <text x="30" y="31" font-family="Arial" font-size="12" fill="white" text-anchor="middle">📊</text>
    <text x="52" y="22" font-family="Arial" font-size="10" fill="white" font-weight="bold">Data Assistant</text>
    <text x="52" y="35" font-family="Arial" font-size="9" fill="rgba(255,255,255,0.8)">online</text>

    <!-- User message 1 - natural language question -->
    <rect x="10" y="62" width="168" height="36" rx="8" fill="#1f2d3d"/>
    <text x="18" y="77" font-family="Arial" font-size="9.5" fill="#e2e8f0">What were my top 5</text>
    <text x="18" y="91" font-family="Arial" font-size="9.5" fill="#e2e8f0">products this month?</text>
    <text x="165" y="94" font-family="Arial" font-size="7.5" fill="#64748b">09:01</text>

    <!-- Bot response - generating SQL -->
    <rect x="10" y="108" width="190" height="22" rx="8" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="105" y="123" font-family="Arial" font-size="8.5" fill="#06b6d4" text-anchor="middle">⚙ Querying data warehouse...</text>

    <!-- Bot response - results -->
    <rect x="10" y="140" width="190" height="106" rx="8" fill="#005c4b"/>
    <text x="18" y="158" font-family="Arial" font-size="9" fill="#e2e8f0" font-weight="bold">Top 5 Products — March 2026</text>
    <line x1="18" y1="163" x2="190" y2="163" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="18" y="177" font-family="Arial" font-size="8.5" fill="#94a3b8">#1</text>
    <text x="32" y="177" font-family="Arial" font-size="8.5" fill="#e2e8f0">Product A</text>
    <text x="190" y="177" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="end">R$ 48.2K</text>
    <text x="18" y="192" font-family="Arial" font-size="8.5" fill="#94a3b8">#2</text>
    <text x="32" y="192" font-family="Arial" font-size="8.5" fill="#e2e8f0">Product B</text>
    <text x="190" y="192" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="end">R$ 31.7K</text>
    <text x="18" y="207" font-family="Arial" font-size="8.5" fill="#94a3b8">#3</text>
    <text x="32" y="207" font-family="Arial" font-size="8.5" fill="#e2e8f0">Product C</text>
    <text x="190" y="207" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="end">R$ 27.1K</text>
    <text x="18" y="222" font-family="Arial" font-size="8.5" fill="#94a3b8">#4</text>
    <text x="32" y="222" font-family="Arial" font-size="8.5" fill="#e2e8f0">Product D</text>
    <text x="190" y="222" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="end">R$ 19.4K</text>
    <text x="18" y="237" font-family="Arial" font-size="8.5" fill="#94a3b8">#5</text>
    <text x="32" y="237" font-family="Arial" font-size="8.5" fill="#e2e8f0">Product E</text>
    <text x="190" y="237" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="end">R$ 14.8K</text>
    <text x="190" y="242" font-family="Arial" font-size="7.5" fill="rgba(255,255,255,0.4)" text-anchor="end">09:01</text>

    <!-- Follow-up message -->
    <rect x="10" y="256" width="168" height="22" rx="8" fill="#1f2d3d"/>
    <text x="18" y="271" font-family="Arial" font-size="9.5" fill="#e2e8f0">Compare with last month?</text>
    <text x="165" y="274" font-family="Arial" font-size="7.5" fill="#64748b">09:02</text>

    <!-- Typing indicator -->
    <rect x="10" y="287" width="60" height="22" rx="11" fill="#1f2d3d"/>
    <circle cx="26" cy="298" r="3.5" fill="#64748b"/>
    <circle cx="38" cy="298" r="3.5" fill="#64748b" opacity="0.6"/>
    <circle cx="50" cy="298" r="3.5" fill="#64748b" opacity="0.3"/>
  </g>

  <!-- FLOW ARROWS & NODES -->
  <!-- Arrow: Phone → n8n -->
  <line x1="278" y1="200" x2="358" y2="200" stroke="#25d366" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="358,194 370,200 358,206" fill="#25d366"/>
  <text x="318" y="190" font-family="Arial" font-size="9" fill="#25d366" text-anchor="middle">NL query</text>

  <!-- n8n node -->
  <g transform="translate(378, 158)" filter="url(#shadow3)">
    <rect x="0" y="0" width="100" height="80" rx="12" fill="#1a2d4a" stroke="rgba(6,182,212,0.5)" stroke-width="1.5"/>
    <text x="50" y="28" font-family="Arial" font-size="22" text-anchor="middle">⚙️</text>
    <text x="50" y="52" font-family="Arial" font-size="13" fill="#06b6d4" text-anchor="middle" font-weight="bold">n8n</text>
    <text x="50" y="67" font-family="Arial" font-size="9" fill="#64748b" text-anchor="middle">orchestrator</text>
  </g>

  <!-- Arrow: n8n → LLM -->
  <line x1="478" y1="185" x2="548" y2="155" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="544,148 556,153 548,163" fill="#8b5cf6"/>
  <text x="512" y="160" font-family="Arial" font-size="8.5" fill="#8b5cf6" text-anchor="middle">translate</text>

  <!-- LLM node -->
  <g transform="translate(562, 110)" filter="url(#shadow3)">
    <rect x="0" y="0" width="100" height="76" rx="12" fill="#1a2d4a" stroke="rgba(139,92,246,0.5)" stroke-width="1.5"/>
    <text x="50" y="26" font-family="Arial" font-size="20" text-anchor="middle">🧠</text>
    <text x="50" y="48" font-family="Arial" font-size="11" fill="#a78bfa" text-anchor="middle" font-weight="bold">LLM</text>
    <text x="50" y="63" font-family="Arial" font-size="8.5" fill="#64748b" text-anchor="middle">NL → SQL</text>
  </g>

  <!-- Arrow: LLM → DW -->
  <line x1="662" y1="148" x2="718" y2="170" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="714,163 726,170 716,178" fill="#8b5cf6"/>
  <text x="698" y="153" font-family="Arial" font-size="8.5" fill="#8b5cf6" text-anchor="middle">SQL</text>

  <!-- Arrow: n8n → DW -->
  <line x1="478" y1="215" x2="718" y2="225" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="718,219 730,225 718,231" fill="#f59e0b"/>
  <text x="598" y="242" font-family="Arial" font-size="8.5" fill="#f59e0b" text-anchor="middle">execute query</text>

  <!-- Data Warehouse node -->
  <g transform="translate(736, 162)" filter="url(#shadow3)">
    <rect x="0" y="0" width="116" height="88" rx="12" fill="#1a2d4a" stroke="rgba(245,158,11,0.5)" stroke-width="1.5"/>
    <!-- DW cylinder shape hint -->
    <ellipse cx="58" cy="22" rx="32" ry="9" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
    <rect x="26" y="22" width="64" height="22" fill="rgba(245,158,11,0.08)"/>
    <ellipse cx="58" cy="44" rx="32" ry="9" fill="#1a2d4a" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <text x="58" y="42" font-family="Arial" font-size="8" fill="#fbbf24" text-anchor="middle">DW</text>
    <text x="58" y="66" font-family="Arial" font-size="11" fill="#fbbf24" text-anchor="middle" font-weight="bold">Warehouse</text>
    <text x="58" y="81" font-family="Arial" font-size="8.5" fill="#64748b" text-anchor="middle">MySQL / PG</text>
  </g>

  <!-- Arrow: DW → n8n (results) -->
  <line x1="736" y1="206" x2="480" y2="205" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <polygon points="487,199 475,205 487,211" fill="#f59e0b" opacity="0.6"/>
  <text x="608" y="196" font-family="Arial" font-size="8.5" fill="#f59e0b" text-anchor="middle">results</text>

  <!-- Arrow: n8n → Phone (response) -->
  <line x1="378" y1="218" x2="278" y2="218" stroke="#06b6d4" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="285,212 273,218 285,224" fill="#06b6d4"/>
  <text x="328" y="232" font-family="Arial" font-size="9" fill="#06b6d4" text-anchor="middle">insight</text>

  <!-- RIGHT: Analytics panel -->
  <g transform="translate(910, 34)">
    <rect x="0" y="0" width="258" height="332" rx="16" fill="rgba(15,31,58,0.85)" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>
    <text x="129" y="28" font-family="Arial" font-size="12" fill="#06b6d4" text-anchor="middle" font-weight="bold">ANALYTICS RESULTS</text>
    <line x1="16" y1="38" x2="242" y2="38" stroke="rgba(6,182,212,0.2)" stroke-width="1"/>

    <!-- Mini bar chart -->
    <text x="16" y="60" font-family="Arial" font-size="9" fill="#94a3b8">Revenue by Category</text>

    <!-- Bars -->
    <rect x="16" y="68" width="160" height="11" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="68" width="160" height="11" rx="3" fill="url(#bar1)"/>
    <text x="182" y="78" font-family="Arial" font-size="8.5" fill="#06b6d4">R$48K</text>
    <text x="16" y="67" font-family="Arial" font-size="7" fill="#64748b">Product A</text>

    <rect x="16" y="86" width="120" height="11" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="86" width="120" height="11" rx="3" fill="url(#bar2)"/>
    <text x="142" y="96" font-family="Arial" font-size="8.5" fill="#a78bfa">R$32K</text>
    <text x="16" y="85" font-family="Arial" font-size="7" fill="#64748b">Product B</text>

    <rect x="16" y="104" width="94" height="11" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="104" width="94" height="11" rx="3" fill="url(#bar3)"/>
    <text x="116" y="114" font-family="Arial" font-size="8.5" fill="#25d366">R$27K</text>
    <text x="16" y="103" font-family="Arial" font-size="7" fill="#64748b">Product C</text>

    <rect x="16" y="122" width="68" height="11" rx="3" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="122" width="68" height="11" rx="3" fill="rgba(245,158,11,0.7)"/>
    <text x="90" y="132" font-family="Arial" font-size="8.5" fill="#fbbf24">R$19K</text>
    <text x="16" y="121" font-family="Arial" font-size="7" fill="#64748b">Product D</text>

    <line x1="16" y1="144" x2="242" y2="144" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>

    <!-- KPI row -->
    <text x="16" y="165" font-family="Arial" font-size="9" fill="#94a3b8">Month-over-Month</text>
    <text x="242" y="165" font-family="Arial" font-size="12" fill="#25d366" text-anchor="end" font-weight="bold">+18.4%</text>
    <rect x="16" y="171" width="226" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="171" width="158" height="4" rx="2" fill="url(#bar3)"/>

    <text x="16" y="196" font-family="Arial" font-size="9" fill="#94a3b8">Total Revenue MTD</text>
    <text x="242" y="196" font-family="Arial" font-size="12" fill="#fbbf24" text-anchor="end" font-weight="bold">R$141K</text>
    <rect x="16" y="202" width="226" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="202" width="190" height="4" rx="2" fill="url(#amber3)"/>

    <text x="16" y="228" font-family="Arial" font-size="9" fill="#94a3b8">Query Response Time</text>
    <text x="242" y="228" font-family="Arial" font-size="12" fill="#06b6d4" text-anchor="end" font-weight="bold">0.8s</text>
    <rect x="16" y="234" width="226" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
    <rect x="16" y="234" width="36" height="4" rx="2" fill="url(#bar1)"/>

    <line x1="16" y1="252" x2="242" y2="252" stroke="rgba(6,182,212,0.15)" stroke-width="1"/>

    <!-- Tech badges -->
    <rect x="16" y="264" width="64" height="22" rx="11" fill="rgba(37,211,102,0.15)" stroke="rgba(37,211,102,0.4)" stroke-width="1"/>
    <text x="48" y="279" font-family="Arial" font-size="8.5" fill="#25d366" text-anchor="middle">WhatsApp</text>

    <rect x="88" y="264" width="50" height="22" rx="11" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
    <text x="113" y="279" font-family="Arial" font-size="8.5" fill="#06b6d4" text-anchor="middle">n8n</text>

    <rect x="146" y="264" width="52" height="22" rx="11" fill="rgba(139,92,246,0.15)" stroke="rgba(139,92,246,0.4)" stroke-width="1"/>
    <text x="172" y="279" font-family="Arial" font-size="8.5" fill="#a78bfa" text-anchor="middle">LLM</text>

    <rect x="16" y="293" width="80" height="22" rx="11" fill="rgba(245,158,11,0.15)" stroke="rgba(245,158,11,0.4)" stroke-width="1"/>
    <text x="56" y="308" font-family="Arial" font-size="8.5" fill="#fbbf24" text-anchor="middle">Data WH</text>

    <rect x="104" y="293" width="94" height="22" rx="11" fill="rgba(6,182,212,0.15)" stroke="rgba(6,182,212,0.4)" stroke-width="1"/>
    <text x="151" y="308" font-family="Arial" font-size="8.5" fill="#06b6d4" text-anchor="middle">Natural Language</text>

    <text x="129" y="328" font-family="Arial" font-size="9" fill="#475569" text-anchor="middle">Ask anything · Get data instantly</text>
  </g>
</svg>
